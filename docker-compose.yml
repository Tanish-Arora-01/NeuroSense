services:
  mongodb:
    image: mongo:7
    container_name: neurosense-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: neurosense-ml-service
    restart: unless-stopped
    env_file: ./ml-service/.env
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service/trained_models:/app/trained_models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/screening/health')"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurosense-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongodb_data:
