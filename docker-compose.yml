version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: neurosense-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  ml-service:
    image: ghcr.io/tanish-arora-01/neurosense-ml-service:latest
    container_name: neurosense-ml-service
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/screening/health')" ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    image: ghcr.io/tanish-arora-01/neurosense-backend:latest
    container_name: neurosense-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r => { if (!r.ok) process.exit(1) })" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: neurosense-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend

volumes:
  mongodb_data:
